<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3d32" />
  <meta name="description" content="Personal fitness and nutrition planner" />
  <title>MyFitnessPal Lite</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0d1f18;
      color: #e8f0ea;
      min-height: 100dvh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    a {
      color: #7ec9a9;
      font-weight: 600;
    }
    p { text-align: center; max-width: 28rem; line-height: 1.5; }
  </style>
</head>
<body>
  <p>Opening <strong>MyFitnessPal Lite</strong>… If nothing happens, <a href="myfitnesspal-lite-dashboard.html">tap here</a>.</p>
  <script>
    (async function () {
      if ('serviceWorker' in navigator) {
        try {
          await navigator.serviceWorker.register('./sw.js', { scope: './' });
        } catch (e) {}
      }
      location.replace('myfitnesspal-lite-dashboard.html');
    })();
  </script>
</body>
</html>
